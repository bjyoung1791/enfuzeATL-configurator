<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enfuze Atlanta — Product Configurator</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#203a43" />
  <link rel="icon" type="image/png" href="./enfuzelogo-brown.png" />
  <link rel="apple-touch-icon" href="./enfuzelogo-brown.png" />

<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;


// ── SUPABASE CONNECTION ──────────────────────────────────────
const SUPABASE_URL = "https://mkjcfffswfbfezoxjxtt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yIoEW1BIUeWbBdpsrl9PQQ_OlmYTElP";

const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage, storageKey: "enfuze-auth" },
});

async function getAuthHeaders() {
  const { data: { session } } = await supa.auth.getSession();
  const token = session?.access_token || SUPABASE_ANON_KEY;
  return { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` };
}

const sb = async (endpoint, options = {}) => {
  const headers = await getAuthHeaders();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...options,
    headers: {
      ...headers,
      "Content-Type": "application/json",
      Prefer: options.prefer || "return=representation",
      ...(options.headers || {}),
    },
  });
  if (res.status === 204) return null;
  return res.json();
};

// ── AUTH SHELL ───────────────────────────────────────────────
function App() {
  const [status, setStatus] = useState("checking"); // 'checking' | 'login' | 'must_change' | 'ready'
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loginError, setLoginError] = useState("");

  const loadProfile = useCallback(async (s) => {
    if (!s) { setProfile(null); setStatus("login"); return; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${s.user.id}&select=*`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${s.access_token}` },
      });
      const rows = await res.json();
      const p = rows?.[0];
      if (!p) {
        setLoginError("No profile found for this user. Contact your admin.");
        await supa.auth.signOut();
        setProfile(null); setStatus("login"); return;
      }
      if (p.active === false) {
        setLoginError("This account is deactivated.");
        await supa.auth.signOut();
        setProfile(null); setStatus("login"); return;
      }
      setProfile(p);
      setStatus(p.must_change_password ? "must_change" : "ready");
    } catch (e) {
      setLoginError("Failed to load profile.");
      setStatus("login");
    }
  }, []);

  useEffect(() => {
    let mounted = true;
    supa.auth.getSession().then(({ data: { session: s } }) => {
      if (!mounted) return;
      setSession(s);
      loadProfile(s);
    });
    const { data: sub } = supa.auth.onAuthStateChange((_event, s) => {
      if (!mounted) return;
      setSession(s);
      if (s) loadProfile(s);
      else { setProfile(null); setStatus("login"); }
    });
    return () => { mounted = false; sub.subscription.unsubscribe(); };
  }, [loadProfile]);

  if (status === "checking") return <AuthSplash message="Loading..." />;
  if (status === "login") return <LoginScreen error={loginError} onClearError={() => setLoginError("")} />;
  if (status === "must_change") return <PasswordChangeScreen onDone={() => loadProfile(session)} />;
  return <EnfuzeConfigurator session={session} profile={profile} />;
}

function AuthSplash({ message }) {
  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", maxWidth: 480, margin: "120px auto", textAlign: "center" }}>
      <div style={{ display: "inline-block", background: "linear-gradient(135deg, #0f2027, #203a43, #2c5364)", padding: "20px 40px", borderRadius: 16, marginBottom: 24 }}>
        <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#fff" }}>Enfuze Atlanta</h1>
      </div>
      <p style={{ color: "#6b7c93", fontSize: 14 }}>{message}</p>
    </div>
  );
}

function LoginScreen({ error, onClearError }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState(error || "");
  const [busy, setBusy] = useState(false);

  useEffect(() => { if (error) setErr(error); }, [error]);

  const submit = async (e) => {
    e?.preventDefault?.();
    setErr(""); onClearError?.();
    setBusy(true);
    const { error: e2 } = await supa.auth.signInWithPassword({ email: email.trim(), password });
    setBusy(false);
    if (e2) setErr(e2.message || "Login failed");
  };

  return (
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", minHeight: "100vh", background: "#f7f9fb", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ maxWidth: 420, width: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ display: "inline-block", background: "linear-gradient(135deg, #0f2027, #203a43, #2c5364)", padding: "20px 40px", borderRadius: 16 }}>
            <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#fff" }}>Enfuze Atlanta</h1>
            <p style={{ margin: "4px 0 0", fontSize: 12, color: "#8ec8e8", fontWeight: 500, letterSpacing: 1.5, textTransform: "uppercase" }}>Product Configurator</p>
          </div>
        </div>
        <form onSubmit={submit} style={{ background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: "1px solid #e2e8f0" }}>
          <h2 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 700, color: "#1a1a2e" }}>Sign in</h2>
          <p style={{ margin: "0 0 20px", fontSize: 13, color: "#6b7c93" }}>Enter your email and password to continue.</p>
          <div style={{ marginBottom: 12 }}>
            <label style={authLabel}>Email</label>
            <input type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} style={authInput} required />
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={authLabel}>Password</label>
            <input type="password" autoComplete="current-password" value={password} onChange={(e) => setPassword(e.target.value)} style={authInput} required />
          </div>
          {err && <p style={{ color: "#e53e3e", fontSize: 13, margin: "0 0 12px" }}>{err}</p>}
          <button type="submit" disabled={busy} style={{ ...authPrimary, opacity: busy ? 0.6 : 1 }}>
            {busy ? "Signing in..." : "Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

function PasswordChangeScreen({ onDone }) {
  const [pw, setPw] = useState("");
  const [confirm, setConfirm] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e?.preventDefault?.();
    setErr("");
    if (pw.length < 8) return setErr("Password must be at least 8 characters");
    if (pw !== confirm) return setErr("Passwords do not match");
    setBusy(true);
    const { error: upErr } = await supa.auth.updateUser({ password: pw });
    if (upErr) { setBusy(false); return setErr(upErr.message); }
    const { error: rpcErr } = await supa.rpc("clear_my_password_change_flag");
    setBusy(false);
    if (rpcErr) return setErr(rpcErr.message);
    onDone?.();
  };

  const logout = async () => { await supa.auth.signOut(); };

  return (
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", minHeight: "100vh", background: "#f7f9fb", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ maxWidth: 420, width: "100%" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ display: "inline-block", background: "linear-gradient(135deg, #0f2027, #203a43, #2c5364)", padding: "20px 40px", borderRadius: 16 }}>
            <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#fff" }}>Set a new password</h1>
          </div>
        </div>
        <form onSubmit={submit} style={{ background: "#fff", borderRadius: 16, padding: 32, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: "1px solid #e2e8f0" }}>
          <p style={{ margin: "0 0 20px", fontSize: 13, color: "#6b7c93" }}>
            Your administrator set a temporary password. Choose a new one to continue.
          </p>
          <div style={{ marginBottom: 12 }}>
            <label style={authLabel}>New Password</label>
            <input type="password" autoComplete="new-password" value={pw} onChange={(e) => setPw(e.target.value)} style={authInput} required />
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={authLabel}>Confirm Password</label>
            <input type="password" autoComplete="new-password" value={confirm} onChange={(e) => setConfirm(e.target.value)} style={authInput} required />
          </div>
          {err && <p style={{ color: "#e53e3e", fontSize: 13, margin: "0 0 12px" }}>{err}</p>}
          <button type="submit" disabled={busy} style={{ ...authPrimary, opacity: busy ? 0.6 : 1 }}>
            {busy ? "Saving..." : "Update Password"}
          </button>
          <button type="button" onClick={logout} style={{ ...authSecondary, marginTop: 8 }}>Cancel / Sign out</button>
        </form>
      </div>
    </div>
  );
}

function TopNav({ profile, onLogout }) {
  if (!profile) return null;
  const isAdmin = profile.role === "admin";
  return (
    <div className="no-print" style={{ maxWidth: 960, margin: "0 auto", padding: "16px 16px 0", display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 8, fontSize: 13 }}>
      <span style={{ color: "#6b7c93", marginRight: 8 }}>
        {profile.full_name || profile.email} · <span style={{ textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 700, fontSize: 11, color: "#203a43" }}>{profile.role.replace("_", " ")}</span>
      </span>
      {isAdmin && (
        <a href="./admin.html" style={navLinkStyle}>Admin</a>
      )}
      <button onClick={onLogout} style={navLinkStyle}>Log out</button>
    </div>
  );
}

const authLabel = { display: "block", fontSize: 12, fontWeight: 600, color: "#4a5568", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 };
const authInput = { width: "100%", padding: "10px 12px", fontSize: 14, border: "2px solid #dce3ed", borderRadius: 8, background: "#fff", color: "#1a1a2e", fontFamily: "inherit", fontWeight: 500, outline: "none", boxSizing: "border-box" };
const authPrimary = { width: "100%", background: "linear-gradient(135deg, #0f2027, #203a43)", color: "#fff", border: "none", padding: "12px 20px", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" };
const authSecondary = { width: "100%", background: "#fff", color: "#203a43", border: "2px solid #dce3ed", padding: "10px 20px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" };
const navLinkStyle = { background: "#fff", color: "#203a43", border: "2px solid #dce3ed", padding: "6px 14px", borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", textDecoration: "none", display: "inline-block" };

// Fallback defaults in case Supabase hasn't loaded yet
const DEFAULT_PRODUCTS = {};
const DEFAULT_INSTALL = { standard: {}, insect_only: {} };
const DEFAULT_CONFIG = {
  max_speakers_per_zone: 12,
  max_subs_per_zone: 2,
  max_repellers_per_zone: 6,
  amp_upgrade_threshold: 8,
  standard_amp_sku: "FA-12L-SNS",
  plus_amp_sku: "FA-PLUS-12L-SNS",
  installation_enabled: true,
};

function createAudioZone(id) {
  return { id, wallSpeakers: 0, wallColor: "black", landscapeSpeakers: 0, subs: 0 };
}

function createInsectZone(id) {
  return { id, repellers: 0 };
}

function EnfuzeConfigurator({ session, profile }) {
  const handleLogout = async () => { await supa.auth.signOut(); };
  // Data from Supabase
  const [PRODUCTS, setProducts] = useState(DEFAULT_PRODUCTS);
  const [INSTALL_RATES, setInstallRates] = useState(DEFAULT_INSTALL);
  const [CONFIG, setConfig] = useState(DEFAULT_CONFIG);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [loadError, setLoadError] = useState(false);

  useEffect(() => {
    const load = async () => {
      try {
        const [productsRaw, ratesRaw, configRaw, recipientRaw] = await Promise.all([
          sb("products?active=eq.true&order=sort_order,sku"),
          sb("install_rates?order=rate_group,sort_order"),
          sb("install_config?order=config_key"),
          sb("admin_settings?setting_key=eq.quote_recipient_email&select=setting_value"),
        ]);
        setRecipientEmail(recipientRaw?.[0]?.setting_value || "");

        // Build products lookup { sku: { name, price, category } }
        const prodMap = {};
        (productsRaw || []).forEach((p) => {
          prodMap[p.sku] = { name: p.name, price: parseFloat(p.unit_price), category: p.category };
        });
        setProducts(prodMap);

        // Build install rates { standard: { "Truck Fee": { rate, markup }, ... }, insect_only: { ... } }
        const rateMap = { standard: {}, insect_only: {} };
        (ratesRaw || []).forEach((r) => {
          const price = parseFloat(r.unit_rate) * parseFloat(r.markup_multiplier);
          if (!rateMap[r.rate_group]) rateMap[r.rate_group] = {};
          rateMap[r.rate_group][r.description] = { cost: parseFloat(r.unit_rate), markup: parseFloat(r.markup_multiplier), price };
        });
        setInstallRates(rateMap);

        // Build config lookup { key: value }
        const cfgMap = {};
        (configRaw || []).forEach((c) => {
          const v = c.config_value;
          if (v === "true") cfgMap[c.config_key] = true;
          else if (v === "false") cfgMap[c.config_key] = false;
          else cfgMap[c.config_key] = isNaN(v) ? v : parseInt(v);
        });
        setConfig((prev) => ({ ...prev, ...cfgMap }));

        setDataLoaded(true);
      } catch (e) {
        console.error("Failed to load from Supabase:", e);
        setLoadError(true);
      }
    };
    load();
  }, []);
  const [serviceType, setServiceType] = useState("");
  const [audioZones, setAudioZones] = useState([]);
  const [insectZones, setInsectZones] = useState([]);
  const [extraCable10, setExtraCable10] = useState(0);
  const [extraCable24, setExtraCable24] = useState(0);
  const [cableSpk16Bk, setCableSpk16Bk] = useState(0);
  const [cableSpk16Wh, setCableSpk16Wh] = useState(0);
  const [cableSub12, setCableSub12] = useState(0);
  const [cablePwr12, setCablePwr12] = useState(0);
  const [forcePlusAmp, setForcePlusAmp] = useState(false);
  const [warning, setWarning] = useState(null);
  const [emailStatus, setEmailStatus] = useState(null);
  const [recipientEmail, setRecipientEmail] = useState("");
  const [projectName, setProjectName] = useState("");
  const [projectDate, setProjectDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [laborView, setLaborView] = useState("total");
  const printRef = useRef(null);

  const showAudio = serviceType === "audio" || serviceType === "both";
  const showInsect = serviceType === "insect" || serviceType === "both";

  const resetAudioCables = () => { setCableSpk16Bk(0); setCableSpk16Wh(0); setCableSub12(0); setCablePwr12(0); };
  const handleServiceChange = (val) => {
    setServiceType(val);
    if (val === "audio") { setAudioZones([createAudioZone(1)]); setInsectZones([]); setExtraCable10(0); setExtraCable24(0); }
    else if (val === "insect") { setAudioZones([]); setInsectZones([createInsectZone(1)]); resetAudioCables(); }
    else if (val === "both") { setAudioZones([createAudioZone(1)]); setInsectZones([createInsectZone(1)]); }
    else { setAudioZones([]); setInsectZones([]); resetAudioCables(); setExtraCable10(0); setExtraCable24(0); }
  };

  const setAudioZoneCount = (count) => {
    const c = Math.max(1, Math.min(10, count));
    setAudioZones((prev) => {
      if (c > prev.length) {
        const newZones = [...prev];
        for (let i = prev.length; i < c; i++) newZones.push(createAudioZone(i + 1));
        return newZones;
      }
      return prev.slice(0, c);
    });
  };

  const setInsectZoneCount = (count) => {
    const c = Math.max(1, Math.min(10, count));
    setInsectZones((prev) => {
      if (c > prev.length) {
        const newZones = [...prev];
        for (let i = prev.length; i < c; i++) newZones.push(createInsectZone(i + 1));
        return newZones;
      }
      return prev.slice(0, c);
    });
  };

  const updateAudioZone = (index, field, value) => {
    setAudioZones((prev) => {
      const updated = [...prev];
      const zone = { ...updated[index] };
      const numVal = typeof value === "string" && field !== "wallColor" ? Math.max(0, parseInt(value) || 0) : value;

      if (field === "wallSpeakers" || field === "landscapeSpeakers") {
        const otherField = field === "wallSpeakers" ? "landscapeSpeakers" : "wallSpeakers";
        const totalSpeakers = numVal + zone[otherField];
        if (totalSpeakers > CONFIG.max_speakers_per_zone) {
          setWarning({ title: "Speaker Limit Exceeded", message: `Zone ${index + 1}: Total speakers (${totalSpeakers}) exceeds the maximum of ${CONFIG.max_speakers_per_zone} per zone. To add more speakers, please add another audio zone.` });
          return prev;
        }
      }
      if (field === "subs" && numVal > CONFIG.max_subs_per_zone) {
        setWarning({ title: "Subwoofer Limit Exceeded", message: `Zone ${index + 1}: Subwoofers (${numVal}) exceeds the maximum of ${CONFIG.max_subs_per_zone} per zone. To add more subs, please add another audio zone.` });
        return prev;
      }
      zone[field] = numVal;
      updated[index] = zone;
      return updated;
    });
  };

  const updateInsectZone = (index, field, value) => {
    setInsectZones((prev) => {
      const updated = [...prev];
      const zone = { ...updated[index] };
      const numVal = Math.max(0, parseInt(value) || 0);
      if (field === "repellers" && numVal > CONFIG.max_repellers_per_zone) {
        setWarning({ title: "Repeller Limit Exceeded", message: `Zone ${index + 1}: Repellers (${numVal}) exceeds the maximum of ${CONFIG.max_repellers_per_zone} per zone. To add more repellers, please add another insect control zone.` });
        return prev;
      }
      zone[field] = numVal;
      updated[index] = zone;
      return updated;
    });
  };

  // Calculate line items
  const calculateQuote = useCallback(() => {
    const itemMap = new Map();
    let totalSpeakerSubPoints = 0;
    let totalAudioZones = 0;
    let totalRepellers = 0;

    const addItem = (sku, qty) => {
      if (qty <= 0) return;
      if (itemMap.has(sku)) {
        itemMap.set(sku, itemMap.get(sku) + qty);
      } else {
        itemMap.set(sku, qty);
      }
    };

    // Audio zones
    audioZones.forEach((zone) => {
      const totalSpeakers = zone.wallSpeakers + zone.landscapeSpeakers;
      if (totalSpeakers === 0 && zone.subs === 0) return;

      totalAudioZones++;
      const ampSku = (forcePlusAmp || totalSpeakers > CONFIG.amp_upgrade_threshold) ? CONFIG.plus_amp_sku : CONFIG.standard_amp_sku;

      addItem("SONOS-PORT", 1);
      addItem(ampSku, 1);
      addItem("PS-120-12VAC-300", 1);

      if (zone.wallSpeakers > 0) {
        const spkSku = zone.wallColor === "black" ? "SPK-5-870-BK" : "SPK-5-870-WH";
        addItem(spkSku, zone.wallSpeakers);
      }
      addItem("SPK-BLT5-870-BR", zone.landscapeSpeakers);
      addItem("SPK-SUB10-BR", zone.subs);
      totalSpeakerSubPoints += zone.wallSpeakers + zone.landscapeSpeakers + zone.subs;
    });

    // Insect zones
    insectZones.forEach((zone) => {
      if (zone.repellers === 0) return;
      addItem("THERM-IS-HUB2", 1);
      addItem("THERM-IS-REP1", zone.repellers);
      addItem("THERM-LIV-R180-1", zone.repellers);
      totalRepellers += zone.repellers;
    });

    // Extension cables (insect)
    addItem("THERM-IS-CC10", extraCable10);
    addItem("THERM-IS-CC24", extraCable24);

    // Audio cables
    addItem("CBL-SPK-16-2-BK-500", cableSpk16Bk);
    addItem("CBL-SPK-16-2-WH-500", cableSpk16Wh);
    addItem("CBL-SPK-12-2-BK-500", cableSub12);
    addItem("CBL-PWR-12-2-BK-500", cablePwr12);

    const lineItems = [];
    itemMap.forEach((qty, sku) => {
      lineItems.push({ sku, qty, price: PRODUCTS[sku].price });
    });

    // Installation
    const installItems = [];
    const installEnabled = CONFIG.installation_enabled !== false;
    const hasAnyItems = lineItems.length > 0;
    const insectOnly = serviceType === "insect";
    const rateGroup = insectOnly ? "insect_only" : "standard";
    const rates = INSTALL_RATES[rateGroup] || {};

    // Helper to get the customer price for a rate description
    const getRate = (desc) => (rates[desc] ? rates[desc].price : 0);

    if (installEnabled) {
      if (hasAnyItems) {
        const truckRate = getRate("Truck Fee");
        const siteRate = getRate("Site Design & Coordination");
        if (truckRate) installItems.push({ desc: "Truck Fee", qty: 1, rate: truckRate, total: truckRate });
        if (siteRate) installItems.push({ desc: "Site Design & Coordination", qty: 1, rate: siteRate, total: siteRate });
      }
      if (!insectOnly && totalSpeakerSubPoints > 0) {
        const spkRate = getRate("Speaker/Sub Audio Point Fee");
        if (spkRate) installItems.push({ desc: "Speaker/Sub Audio Point Fee", qty: totalSpeakerSubPoints, rate: spkRate, total: totalSpeakerSubPoints * spkRate });
      }
      if (!insectOnly && totalAudioZones > 0) {
        const ampRate = getRate("Amp & Transformer Install");
        if (ampRate) installItems.push({ desc: "Amp & Transformer Install", qty: totalAudioZones, rate: ampRate, total: totalAudioZones * ampRate });
      }
      if (totalRepellers > 0) {
        const thermRate = getRate("Thermacell Point Fee");
        if (thermRate) installItems.push({ desc: "Thermacell Point Fee", qty: totalRepellers, rate: thermRate, total: totalRepellers * thermRate });
      }
    }

    const equipmentTotal = lineItems.reduce((sum, item) => sum + item.qty * item.price, 0);
    const installTotal = installItems.reduce((sum, item) => sum + item.total, 0);

    return { lineItems, installItems, equipmentTotal, installTotal, installEnabled, grandTotal: equipmentTotal + installTotal };
  }, [audioZones, insectZones, extraCable10, extraCable24, cableSpk16Bk, cableSpk16Wh, cableSub12, cablePwr12, forcePlusAmp, serviceType, PRODUCTS, INSTALL_RATES, CONFIG]);

  const quote = calculateQuote();
  const hasConfig = quote.lineItems.length > 0;

  const formatDate = (dateStr) => {
    if (!dateStr) return "";
    const [y, m, d] = dateStr.split("-");
    return `${m}/${d}/${y}`;
  };

  const exportPDF = () => {
    const el = printRef.current;
    if (!el) return;
    const style = document.createElement("style");
    style.textContent = `
      @media print {
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 24px; }
        .no-print { display: none !important; }
        @page { margin: 0.5in; }
      }
    `;
    document.head.appendChild(style);
    window.print();
    setTimeout(() => document.head.removeChild(style), 500);
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const header = [
      ["Enfuze Atlanta — Product Configurator"],
      ["Project:", projectName || "(No project name)"],
      ["Date:", formatDate(projectDate)],
      [],
      ["EQUIPMENT"],
      ["SKU", "Description", "Qty", "Unit Price", "Ext. Price"],
    ];
    const equipRows = quote.lineItems.map((item) => [
      item.sku, PRODUCTS[item.sku].name, item.qty, item.price, item.qty * item.price,
    ]);
    const installSection = !quote.installEnabled
      ? []
      : laborView === "itemized"
        ? [[], ["INSTALLATION"], ["Description", "Qty", "Rate", "Total"], ...quote.installItems.map((item) => [item.desc, item.qty, item.rate, item.total])]
        : [[], ["INSTALLATION"], ["Installation Total", "", "", quote.installTotal]];
    const totals = [
      [], ["", "", "", "Equipment Subtotal", quote.equipmentTotal],
      ...(quote.installEnabled ? [["", "", "", "Installation Subtotal", quote.installTotal]] : []),
      ["", "", "", "GRAND TOTAL", quote.grandTotal],
    ];
    const data = [...header, ...equipRows, ...installSection, ...totals];
    const ws = XLSX.utils.aoa_to_sheet(data);

    // Column widths
    ws["!cols"] = [{ wch: 24 }, { wch: 44 }, { wch: 6 }, { wch: 12 }, { wch: 14 }];

    XLSX.utils.book_append_sheet(wb, ws, "Quote");
    const fileName = projectName ? `${projectName.replace(/[^a-zA-Z0-9]/g, "_")}_Quote.xlsx` : "Enfuze_Quote.xlsx";
    XLSX.writeFile(wb, fileName);
  };

  const buildCSV = () => {
    const esc = (v) => {
      if (v === null || v === undefined) return "";
      const s = String(v);
      return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const rows = [
      ["Enfuze Atlanta — Product Configurator"],
      ["Project:", projectName || "(No project name)"],
      ["Date:", formatDate(projectDate)],
      [],
      ["EQUIPMENT"],
      ["SKU", "Description", "Qty", "Unit Price", "Ext. Price"],
      ...quote.lineItems.map((item) => [item.sku, PRODUCTS[item.sku].name, item.qty, item.price, item.qty * item.price]),
    ];
    if (quote.installEnabled) {
      rows.push([], ["INSTALLATION"]);
      if (laborView === "itemized") {
        rows.push(["Description", "Qty", "Rate", "Total"]);
        quote.installItems.forEach((item) => rows.push([item.desc, item.qty, item.rate, item.total]));
      } else {
        rows.push(["Installation Total", "", "", quote.installTotal]);
      }
    }
    rows.push([], ["", "", "", "Equipment Subtotal", quote.equipmentTotal]);
    if (quote.installEnabled) rows.push(["", "", "", "Installation Subtotal", quote.installTotal]);
    rows.push(["", "", "", "GRAND TOTAL", quote.grandTotal]);
    return rows.map((r) => r.map(esc).join(",")).join("\r\n");
  };

  const emailQuote = async () => {
    if (emailStatus === "sending") return;
    setEmailStatus("sending");
    try {
      const csv = buildCSV();
      const blob = new Blob([csv], { type: "text/csv" });
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      const baseName = projectName ? projectName.replace(/[^a-zA-Z0-9]/g, "_") : "Enfuze_Quote";
      const filename = `${baseName}.csv`;
      const subject = `Enfuze Quote — ${projectName || "Untitled Project"}`;
      const body =
        `Enfuze Atlanta — Product Configurator\n` +
        `Project: ${projectName || "(No project name)"}\n` +
        `Date: ${formatDate(projectDate)}\n\n` +
        `Equipment Subtotal: $${quote.equipmentTotal.toLocaleString()}\n` +
        (quote.installEnabled ? `Installation Subtotal: $${quote.installTotal.toLocaleString()}\n` : "") +
        `Grand Total: $${quote.grandTotal.toLocaleString()}\n`;

      const { data: { session: s } } = await supa.auth.getSession();
      const res = await fetch("/api/send-quote", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(s?.access_token ? { Authorization: `Bearer ${s.access_token}` } : {}),
        },
        body: JSON.stringify({ subject, body, filename, contentBase64: base64 }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error || `Send failed (${res.status})`);
      setEmailStatus("sent");
      setTimeout(() => setEmailStatus(null), 3000);
    } catch (e) {
      console.error("Email quote failed:", e);
      setEmailStatus("error");
      setTimeout(() => setEmailStatus(null), 4000);
    }
  };

              </button>

                </tr>
              </thead>
              <tbody>
                {quote.lineItems.map((item, i) => (
                  <tr key={i} style={{ borderBottom: "1px solid #e2e8f0" }}>
                    <td style={{ ...tdStyle, fontFamily: "monospace", fontSize: 12, color: "#6b7c93" }}>{item.sku}</td>
                    <td style={tdStyle}>{PRODUCTS[item.sku].name}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{item.qty}</td>

                <tr style={{ borderTop: "2px solid #203a43" }}>

        </Card>
      )}

      {/* Warning Modal */}
      {warning && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(15,32,39,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999, padding: 16 }} onClick={() => setWarning(null)}>
          <div style={{ background: "#fff", borderRadius: 16, padding: 32, maxWidth: 440, width: "100%", boxShadow: "0 24px 48px rgba(0,0,0,0.2)", textAlign: "center" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: "#fff3cd", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28 }}>⚠️</div>
            <h3 style={{ margin: "0 0 12px", fontSize: 20, fontWeight: 700, color: "#1a1a2e" }}>{warning.title}</h3>
            <p style={{ margin: "0 0 24px", fontSize: 15, color: "#4a5568", lineHeight: 1.6 }}>{warning.message}</p>
            <button onClick={() => setWarning(null)} style={{ background: "linear-gradient(135deg, #0f2027, #203a43)", color: "#fff", border: "none", padding: "12px 32px", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>Got It</button>
          </div>
        </div>
      )}
    </div>
    </div>
  );
}

/* --- Sub-components --- */

function Card({ title, children }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: 24, marginBottom: 20, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", border: "1px solid #e2e8f0" }}>
      <h2 style={{ margin: "0 0 20px", fontSize: 18, fontWeight: 700, color: "#0f2027", borderBottom: "2px solid #2c5364", paddingBottom: 10 }}>{title}</h2>
      {children}
    </div>
  );
}

function Label({ children }) {
  return <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#4a5568", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>{children}</label>;
}

function NumberInput({ value, onChange, min = 0, max = 99 }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0, border: "2px solid #dce3ed", borderRadius: 8, overflow: "hidden", width: "fit-content" }}>
      <button onClick={() => onChange(Math.max(min, value - 1))} style={numBtnStyle}>−</button>
      <input
        type="number"
        value={value}
        onChange={(e) => {
          const v = parseInt(e.target.value) || 0;
          onChange(Math.max(min, Math.min(max, v)));
        }}
        style={{ width: 56, textAlign: "center", border: "none", borderLeft: "2px solid #dce3ed", borderRight: "2px solid #dce3ed", fontSize: 16, fontWeight: 600, padding: "8px 0", outline: "none", color: "#1a1a2e", fontFamily: "inherit" }}
      />
      <button onClick={() => onChange(Math.min(max, value + 1))} style={numBtnStyle}>+</button>
    </div>
  );
}

/* --- Styles --- */

const selectStyle = {
  width: "100%", padding: "12px 16px", fontSize: 15, border: "2px solid #dce3ed", borderRadius: 8, background: "#fff", color: "#1a1a2e", fontFamily: "inherit", fontWeight: 500, outline: "none", cursor: "pointer", appearance: "auto",
};

const numBtnStyle = {
  width: 40, height: 40, border: "none", background: "#f0f4f8", fontSize: 18, fontWeight: 700, color: "#203a43", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit",
};

const thStyle = { padding: "10px 12px", textAlign: "left", fontSize: 12, fontWeight: 700, color: "#4a5568", textTransform: "uppercase", letterSpacing: 0.5 };
const tdStyle = { padding: "10px 12px" };

const exportBtnStyle = {
  background: "linear-gradient(135deg, #0f2027, #203a43)",
  color: "#fff", border: "none", padding: "10px 20px", borderRadius: 8,
  fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex",
  alignItems: "center", fontFamily: "inherit", whiteSpace: "nowrap",
};


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
